{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
    <h2>Create Attendance Session</h2>
    <p style="margin-bottom: 2rem;">Start a new class and generate a session code.</p>
    
    <form method="POST" action="{{ url_for('create_session') }}">
        <div class="form-group">
            <label for="subject">Subject Name</label>
            <input type="text" id="subject" name="subject" class="form-control" required placeholder="e.g. Data Structures">
        </div>
        
        <button type="submit" class="btn btn-primary">Generate Session Code</button>
        <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-outline" style="margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
