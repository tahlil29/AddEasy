{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
    <h2>Add New Teacher</h2>
    <p style="margin-bottom: 2rem;">Register a new teacher into the system.</p>
    
    <form method="POST" action="{{ url_for('add_teacher') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. Dr. Jane Smith">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="username">Teacher ID / Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="e.g. teacher2">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Default password">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Register Teacher</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline" style="margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
