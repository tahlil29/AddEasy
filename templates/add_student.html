{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
    <h2>Add New Student</h2>
    <p style="margin-bottom: 2rem;">Register a new student into the system.</p>
    
    <form method="POST" action="{{ url_for('add_student') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. John Doe">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="username">Username / Roll ID</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="e.g. CS101">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Default password">
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="course">Course/Class</label>
                <input type="text" id="course" name="course" class="form-control" required placeholder="e.g. Computer Science">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="year">Year</label>
                <input type="text" id="year" name="year" class="form-control" required placeholder="e.g. 1st Year">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Register Student</button>
        <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-outline" style="margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
