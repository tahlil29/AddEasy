{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
    <h2>Post a Notice</h2>
    <p style="margin-bottom: 2rem;">Broadcast an announcement to all students.</p>
    
    <form method="POST" action="{{ url_for('post_notice') }}">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" class="form-control" required placeholder="e.g. Tomorrow's Class Cancelled">
        </div>
        
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" class="form-control" rows="5" required placeholder="Write your announcement here..."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Post Notice</button>
        <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-outline" style="margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
